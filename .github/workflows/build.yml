name: Build Android APK

on:
  push:
    branches: [feat/android-client]
    paths:
      - "android-app/**"
      - "xingling-game/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: xingling-game/package-lock.json

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Build web game
        working-directory: xingling-game
        run: |
          npm install
          npm run build

      - name: Copy game assets to Android
        run: |
          mkdir -p android-app/app/src/main/assets/www
          cp -r xingling-game/dist/* android-app/app/src/main/assets/www/

      - name: Build APK
        working-directory: android-app
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xingling-android-apk
          path: android-app/app/build/outputs/apk/release/*.apk
          retention-days: 30
