name: Build Windows Installer

on:
  push:
    branches: [feat/windows-client]
    paths:
      - "src-tauri/**"
      - "xingling-game/**"
      - "package.json"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Windows dependencies
        run: |
          choco install visualstudio2022buildtools --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --includeRecommended --passive --norestart"

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/target
            ~/.cargo/registry
            ~/.cargo/git
          key: windows-cargo-${{ hashFiles('src-tauri/Cargo.toml') }}
          restore-keys: windows-cargo-

      - name: Install root dependencies (Tauri CLI)
        run: npm install

      - name: Install game dependencies
        working-directory: xingling-game
        run: npm install

      - name: Build Tauri app
        run: npx @tauri-apps/cli build

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: xingling-windows-installer
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30
