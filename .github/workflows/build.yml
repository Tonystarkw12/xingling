name: Build macOS App

on:
  push:
    branches: [feat/mac-client]
    paths:
      - "src-tauri/**"
      - "xingling-game/**"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS dependencies
        run: |
          xcode-select --install || true

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/target
            ~/.cargo/registry
            ~/.cargo/git
          key: macos-cargo-${{ hashFiles('src-tauri/Cargo.toml') }}
          restore-keys: macos-cargo-

      - name: Install root dependencies (Tauri CLI)
        run: npm install

      - name: Install game dependencies
        working-directory: xingling-game
        run: npm install

      - name: Build Tauri app
        run: npx @tauri-apps/cli build

      - name: Upload macOS app
        uses: actions/upload-artifact@v4
        with:
          name: xingling-macos-app
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
          retention-days: 30
